<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cours FLE — Pierre Vaucher</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital@0;1&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    background: #F8F7F5;
    color: #1A1A1A;
    min-height: 100vh;
    padding: 4rem 2rem;
  }

  .wrapper {
    max-width: 600px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 3.5rem;
  }

  h1 {
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: .02em;
    color: #1A1A1A;
    margin-bottom: .3rem;
  }

  .subtitle {
    font-size: .8rem;
    color: #999;
    letter-spacing: .03em;
  }

  /* ── SECTION ── */
  .section {
    margin-bottom: 2.5rem;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    color: #BBB;
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    padding-bottom: .4rem;
    border-bottom: 1px solid #E8E6E2;
  }

  /* ── LIENS ── */
  .cours-list {
    list-style: none;
  }

  .cours-list li {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    padding: .55rem 0;
    border-bottom: 1px solid #EDECEA;
  }

  .cours-list li:last-child {
    border-bottom: none;
  }

  .cours-link {
    text-decoration: none;
    font-size: .95rem;
    color: #1A1A1A;
    transition: color .1s;
  }

  .cours-link:hover {
    color: #888;
  }

  .cours-meta {
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    color: #BBB;
    white-space: nowrap;
    font-style: italic;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: .65rem;
    color: #999;
    background: #EDECEA;
    padding: 2px 7px;
    border-radius: 2px;
  }

  .tag.actif {
    color: #4A7C59;
    background: #EBF2ED;
  }

  .placeholder {
    color: #CCC;
    font-style: italic;
    font-size: .85rem;
  }

  footer {
    margin-top: 4rem;
    font-family: 'DM Mono', monospace;
    font-size: .65rem;
    color: #CCC;
    letter-spacing: .05em;
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <h1>Cours FLE — Princlili</h1>
  </header>

  <div class="section">
    <div class="section-label">En cours</div>
    <ul class="cours-list">
      <li>
        <a class="cours-link" href="kursplans/B1-3/kursplan_B1-3.html">Français B1 (3/3) — Kursplan</a>
        <span class="tag actif">2026</span>
      </li>
    </ul>
  </div>

  <div class="section">
    <div class="section-label">Archives</div>
    <ul class="cours-list">
      <li><span class="placeholder">—</span></li>
    </ul>
  </div>

  <footer>usage personnel · princlili.github.io/mes-cours-fle</footer>

</div>
</body>
</html>
